services:
  volleyball-stats:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: volleyball-stats
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-this-secret}
      TZ: ${TZ:-America/Los_Angeles}
    volumes:
      - volleyball_stats_data:/app/data
      - volleyball_stats_uploads:/app/static/uploads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  volleyball_stats_data:
  volleyball_stats_uploads:
